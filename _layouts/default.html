<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <nav class="site-nav">
          <a class="brand" href="{{ "/" | relative_url }}">{{ site.title }}</a>
          <a href="{{ "/docs/quickstart" | relative_url }}">Quickstart</a>
          <a href="{{ "/docs/projects" | relative_url }}">Projects</a>
          <a href="{{ "/docs/faq" | relative_url }}">FAQ</a>
          <a href="{{ "/about" | relative_url }}">About</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper footer-grid">
        <div>
          <strong>{{ site.title }}</strong>
          <div class="muted">{{ site.description }}</div>
        </div>
        <div>
          <div class="muted">Questions or ideas?</div>
          <div>Open an issue on GitHub.</div>
        </div>
        <div class="footer-right muted">&copy; {{ site.time | date: "%Y" }}</div>
      </div>
    </footer>
  </body>
</html>
